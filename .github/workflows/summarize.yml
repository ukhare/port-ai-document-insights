name: AI Document Insights

on:
  workflow_dispatch:
    inputs:
      web_url:
        description: 'Web URL to analyze'
        required: false
        type: string
        default: ''
      file_url:
        description: 'File URL to analyze'
        required: false
        type: string
        default: ''
      run_id:
        description: 'Port run ID'
        required: true
        type: string

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Notify Port - START
        run: |
          curl -X PATCH "https://api.getport.io/v1/actions/runs/${{ github.event.inputs.run_id }}" \
          -H "Authorization: Bearer ${{ secrets.PORT_API_KEY }}" \
          -H "Content-Type: application/json" \
          -d '{"status":"IN_PROGRESS"}'

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install deps
        run: pip install -r summarizer/requirements.txt

      - name: Download file
        if: github.event.inputs.file_url != '' && github.event.inputs.file_url != 'null'
        run: |
          echo "Downloading file from: ${{ github.event.inputs.file_url }}"
          curl -L "${{ github.event.inputs.file_url }}" -o input_file
          ls -l input_file

      - name: Debug inputs
        run: |
          echo "web_url input: '${{ github.event.inputs.web_url }}'"
          echo "file_url input: '${{ github.event.inputs.file_url }}'"
          echo "File exists: $(test -f input_file && echo 'yes' || echo 'no')"

      - name: Run script
        id: run_script
        env:
          WEB_URL: ${{ github.event.inputs.web_url }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python summarizer/main.py

      - name: Update Port with final status
        if: always()
        run: |
          if [ "${{ steps.run_script.outcome }}" == "success" ] && [ -f summary.txt ]; then
            SUMMARY=$(jq -Rs . < summary.txt)
            STATUS="SUCCESS"
            PAYLOAD="{\"status\":\"$STATUS\",\"outputs\":{\"summary\":$SUMMARY}}"
          else
            STATUS="FAILURE"
            MESSAGE="Workflow execution failed. Check GitHub Actions logs for details."
            PAYLOAD="{\"status\":\"$STATUS\",\"message\":\"$MESSAGE\"}"
          fi

          curl -X PATCH "https://api.getport.io/v1/actions/runs/${{ github.event.inputs.run_id }}" \
          -H "Authorization: Bearer ${{ secrets.PORT_API_KEY }}" \
          -H "Content-Type: application/json" \
          -d "$PAYLOAD"

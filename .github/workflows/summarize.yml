name: AI Document Insights

on:
  workflow_dispatch:
    inputs:
      web_url:
        description: 'Web URL to analyze'
        required: false
        type: string
        default: ''
      file_url:
        description: 'File URL to analyze'
        required: false
        type: string
        default: ''
      run_id:
        description: 'Port run ID'
        required: true
        type: string
      port_context:
        description: 'Port context (auto-injected)'
        required: false
        type: string

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Log to Port - Starting
        run: |
          TOKEN=$(curl -s -X POST "https://api.getport.io/v1/auth/access_token" \
            -H "Content-Type: application/json" \
            -d "{\"clientId\":\"${{ secrets.PORT_CLIENT_ID }}\",\"clientSecret\":\"${{ secrets.PORT_CLIENT_SECRET }}\"}" \
            | jq -r '.accessToken')
          
          curl -X POST "https://api.getport.io/v1/actions/runs/${{ github.event.inputs.run_id }}/logs" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"message":"🚀 Starting AI Document Insights analysis..."}'

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Log to Port - Installing Dependencies
        run: |
          TOKEN=$(curl -s -X POST "https://api.getport.io/v1/auth/access_token" \
            -H "Content-Type: application/json" \
            -d "{\"clientId\":\"${{ secrets.PORT_CLIENT_ID }}\",\"clientSecret\":\"${{ secrets.PORT_CLIENT_SECRET }}\"}" \
            | jq -r '.accessToken')
          
          curl -X POST "https://api.getport.io/v1/actions/runs/${{ github.event.inputs.run_id }}/logs" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"message":"📦 Installing Python dependencies (including PDF parsers)..."}'

      - name: Install dependencies
        run: pip install -r summarizer/requirements.txt

      - name: Download and verify file
        if: github.event.inputs.file_url != '' && github.event.inputs.file_url != 'null'
        run: |
          echo "📥 Downloading file from: ${{ github.event.inputs.file_url }}"
          curl -L "${{ github.event.inputs.file_url }}" -o input_file
          
          # Verify download
          if [ ! -s input_file ]; then
            echo "❌ Downloaded file is empty!"
            exit 1
          fi
          
          # Check file type and size
          echo "📄 File information:"
          file input_file
          ls -lh input_file
          
          # If PDF, verify it's valid
          if file input_file | grep -q "PDF"; then
            echo "✅ Valid PDF file detected"
            
            # Log to Port
            TOKEN=$(curl -s -X POST "https://api.getport.io/v1/auth/access_token" \
              -H "Content-Type: application/json" \
              -d "{\"clientId\":\"${{ secrets.PORT_CLIENT_ID }}\",\"clientSecret\":\"${{ secrets.PORT_CLIENT_SECRET }}\"}" \
              | jq -r '.accessToken')
            
            FILE_SIZE=$(ls -lh input_file | awk '{print $5}')
            curl -X POST "https://api.getport.io/v1/actions/runs/${{ github.event.inputs.run_id }}/logs" \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"message\":\"📄 PDF file downloaded successfully (${FILE_SIZE})\"}"
          fi

      - name: Debug inputs
        run: |
          echo "🔍 Input validation:"
          echo "  web_url: '${{ github.event.inputs.web_url }}'"
          echo "  file_url: '${{ github.event.inputs.file_url }}'"
          echo "  File exists: $(test -f input_file && echo 'YES ✅' || echo 'NO ❌')"
          
          if [ -f input_file ]; then
            echo "  File type: $(file -b input_file)"
            echo "  File size: $(du -h input_file | cut -f1)"
          fi

      - name: Log to Port - Running Analysis
        run: |
          TOKEN=$(curl -s -X POST "https://api.getport.io/v1/auth/access_token" \
            -H "Content-Type: application/json" \
            -d "{\"clientId\":\"${{ secrets.PORT_CLIENT_ID }}\",\"clientSecret\":\"${{ secrets.PORT_CLIENT_SECRET }}\"}" \
            | jq -r '.accessToken')
          
          if [ -f input_file ] && file input_file | grep -q "PDF"; then
            MESSAGE="🤖 Running AI summarizer on PDF document..."
          else
            MESSAGE="🤖 Running AI summarizer on web content..."
          fi
          
          curl -X POST "https://api.getport.io/v1/actions/runs/${{ github.event.inputs.run_id }}/logs" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"message\":\"$MESSAGE\"}"

      - name: Run AI Summarizer
        id: run_script
        env:
          WEB_URL: ${{ github.event.inputs.web_url }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          # Run the script and capture output
          python summarizer/main.py 2>&1 | tee script_output.log
          
          # Store exit code
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      - name: Stream Python Script Logs to Port
        if: always()
        run: |
          TOKEN=$(curl -s -X POST "https://api.getport.io/v1/auth/access_token" \
            -H "Content-Type: application/json" \
            -d "{\"clientId\":\"${{ secrets.PORT_CLIENT_ID }}\",\"clientSecret\":\"${{ secrets.PORT_CLIENT_SECRET }}\"}" \
            | jq -r '.accessToken')
          
          # Send script output logs if they exist
          if [ -f script_output.log ]; then
            # Read log file and escape for JSON
            LOG_CONTENT=$(cat script_output.log | jq -Rs .)
            
            curl -X POST "https://api.getport.io/v1/actions/runs/${{ github.event.inputs.run_id }}/logs" \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"message\":\"📋 **Python Script Output:**

              \`\`\`
               ${LOG_CONTENT}
               \`\`\`\"}"
          fi

      - name: Verify summary generation
        id: verify_summary
        if: steps.run_script.outcome == 'success'
        run: |
          if [ -f summary.txt ]; then
            SUMMARY_SIZE=$(wc -c < summary.txt)
            echo "✅ Summary generated successfully (${SUMMARY_SIZE} bytes)"
            echo "summary_exists=true" >> $GITHUB_OUTPUT
            
            # Log to Port
            TOKEN=$(curl -s -X POST "https://api.getport.io/v1/auth/access_token" \
              -H "Content-Type: application/json" \
              -d "{\"clientId\":\"${{ secrets.PORT_CLIENT_ID }}\",\"clientSecret\":\"${{ secrets.PORT_CLIENT_SECRET }}\"}" \
              | jq -r '.accessToken')
            
            curl -X POST "https://api.getport.io/v1/actions/runs/${{ github.event.inputs.run_id }}/logs" \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"message\":\"✅ Summary file generated (${SUMMARY_SIZE} bytes)\"}"
          else
            echo "⚠️ Warning: summary.txt not found"
            echo "summary_exists=false" >> $GITHUB_OUTPUT
            
            # Log to Port
            TOKEN=$(curl -s -X POST "https://api.getport.io/v1/auth/access_token" \
              -H "Content-Type: application/json" \
              -d "{\"clientId\":\"${{ secrets.PORT_CLIENT_ID }}\",\"clientSecret\":\"${{ secrets.PORT_CLIENT_SECRET }}\"}" \
              | jq -r '.accessToken')
            
            curl -X POST "https://api.getport.io/v1/actions/runs/${{ github.event.inputs.run_id }}/logs" \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" \
              -d '{"message":"⚠️ Warning: summary.txt file not found"}'
          fi

      - name: Read Summary File
        id: read_summary
        if: steps.run_script.outcome == 'success' && steps.verify_summary.outputs.summary_exists == 'true'
        run: |
          echo "content<<EOF" >> $GITHUB_OUTPUT
          cat summary.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # ===== IMPROVED REPORTING SECTION =====
      
      - name: Report Success to Port
        if: steps.run_script.outcome == 'success' && steps.verify_summary.outputs.summary_exists == 'true'
        uses: port-labs/port-github-action@v1
        with:
          clientId: ${{ secrets.PORT_CLIENT_ID }}
          clientSecret: ${{ secrets.PORT_CLIENT_SECRET }}
          baseUrl: https://api.getport.io
          operation: PATCH_RUN
          runId: ${{ github.event.inputs.run_id }}
          status: SUCCESS
          logMessage: |
            ✅ **AI Document Insights - Analysis Complete**
            
            📄 **Summary Generated:**
            
            ${{ steps.read_summary.outputs.content }}

      - name: Report Warning to Port
        if: steps.run_script.outcome == 'success' && steps.verify_summary.outputs.summary_exists != 'true'
        uses: port-labs/port-github-action@v1
        with:
          clientId: ${{ secrets.PORT_CLIENT_ID }}
          clientSecret: ${{ secrets.PORT_CLIENT_SECRET }}
          baseUrl: https://api.getport.io
          operation: PATCH_RUN
          runId: ${{ github.event.inputs.run_id }}
          status: SUCCESS
          logMessage: |
            ⚠️ **Analysis completed but summary file was not generated**
            
            The Python script ran successfully but did not create a summary.txt file.
            Please check the script output logs above for details.

      - name: Report Failure to Port
        if: steps.run_script.outcome != 'success'
        uses: port-labs/port-github-action@v1
        with:
          clientId: ${{ secrets.PORT_CLIENT_ID }}
          clientSecret: ${{ secrets.PORT_CLIENT_SECRET }}
          baseUrl: https://api.getport.io
          operation: PATCH_RUN
          runId: ${{ github.event.inputs.run_id }}
          status: FAILURE
          logMessage: |
            ❌ **Analysis Failed**
            
            The AI summarizer script encountered an error.
            Please check the Python script output logs above for error details.
            
            Common issues:
            - Invalid or inaccessible URL
            - PDF parsing errors
            - API key issues (OpenAI/Groq)
            - Network connectivity problems
            

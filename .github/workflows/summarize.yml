name: AI Document Insights

on:
  workflow_dispatch:
    inputs:
      web_url:
        description: 'Web URL to analyze'
        required: false
        type: string
        default: ''
      file_url:
        description: 'File URL to analyze'
        required: false
        type: string
        default: ''
      run_id:
        description: 'Port run ID'
        required: true
        type: string
      port_context:
        description: 'Port context (auto-injected)'
        required: false
        type: string

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Log to Port - Starting
        run: |
          TOKEN=$(curl -s -X POST "https://api.getport.io/v1/auth/access_token" \
            -H "Content-Type: application/json" \
            -d "{\"clientId\":\"${{ secrets.PORT_CLIENT_ID }}\",\"clientSecret\":\"${{ secrets.PORT_CLIENT_SECRET }}\"}" \
            | jq -r '.accessToken')
          
          curl -X POST "https://api.getport.io/v1/actions/runs/${{ github.event.inputs.run_id }}/logs" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"message":"🚀 Starting AI Document Insights analysis..."}'

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Log to Port - Installing Dependencies
        run: |
          TOKEN=$(curl -s -X POST "https://api.getport.io/v1/auth/access_token" \
            -H "Content-Type: application/json" \
            -d "{\"clientId\":\"${{ secrets.PORT_CLIENT_ID }}\",\"clientSecret\":\"${{ secrets.PORT_CLIENT_SECRET }}\"}" \
            | jq -r '.accessToken')
          
          curl -X POST "https://api.getport.io/v1/actions/runs/${{ github.event.inputs.run_id }}/logs" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"message":"📦 Installing Python dependencies..."}'

      - name: Install dependencies
        run: pip install -r summarizer/requirements.txt

      - name: Download file
        if: github.event.inputs.file_url != '' && github.event.inputs.file_url != 'null'
        run: |
          echo "Downloading file from: ${{ github.event.inputs.file_url }}"
          curl -L "${{ github.event.inputs.file_url }}" -o input_file
          ls -l input_file

      - name: Debug inputs
        run: |
          echo "web_url input: '${{ github.event.inputs.web_url }}'"
          echo "file_url input: '${{ github.event.inputs.file_url }}'"
          echo "File exists: $(test -f input_file && echo 'yes' || echo 'no')"

      - name: Log to Port - Running Analysis
        run: |
          TOKEN=$(curl -s -X POST "https://api.getport.io/v1/auth/access_token" \
            -H "Content-Type: application/json" \
            -d "{\"clientId\":\"${{ secrets.PORT_CLIENT_ID }}\",\"clientSecret\":\"${{ secrets.PORT_CLIENT_SECRET }}\"}" \
            | jq -r '.accessToken')
          
          curl -X POST "https://api.getport.io/v1/actions/runs/${{ github.event.inputs.run_id }}/logs" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"message":"🤖 Running AI summarizer..."}'

      - name: Run AI Summarizer
        id: run_script
        env:
          WEB_URL: ${{ github.event.inputs.web_url }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python summarizer/main.py

      - name: Read Summary File
        id: read_summary
        if: steps.run_script.outcome == 'success' && hashFiles('summary.txt') != ''
        run: |
          echo "content<<EOF" >> $GITHUB_OUTPUT
          cat summary.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Report Results to Port
        if: always()
        uses: port-labs/port-github-action@v1
        with:
          clientId: ${{ secrets.PORT_CLIENT_ID }}
          clientSecret: ${{ secrets.PORT_CLIENT_SECRET }}
          baseUrl: https://api.getport.io
          operation: PATCH_RUN
          runId: ${{ github.event.inputs.run_id }}
          status: ${{ steps.run_script.outcome == 'success' && 'SUCCESS' || 'FAILURE' }}
          logMessage: |
            ${{ steps.run_script.outcome == 'success' && format('✅ AI Document Insights - Analysis Complete
            
            📄 **Summary Generated:**
            
            {0}', steps.read_summary.outputs.content) || '❌ Analysis failed. Check GitHub Actions logs for details.' }}
            
